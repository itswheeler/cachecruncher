<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2433"/>
      <stop offset="1" stop-color="#151b25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,80)">
    <text x="0" y="60" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#ffffff">🧮 Cache Cruncher</text>
    <text x="0" y="120" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="28" fill="#c7d2fe">Cache · Memory · Virtual Memory bits calculator</text>
  </g>
  <g transform="translate(80,260)">
    <rect width="1040" height="290" rx="20" fill="url(#card)" stroke="#232b38" stroke-width="2"/>
    <g font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" fill="#e6edf3">
      <text x="40" y="60"><tspan fill="#8b95a8">cache_size  =</tspan> 32 KB</text>
      <text x="40" y="98"><tspan fill="#8b95a8">block_size  =</tspan> 64 B</text>
      <text x="40" y="136"><tspan fill="#8b95a8">assoc       =</tspan> 4-way</text>
      <text x="40" y="174"><tspan fill="#8b95a8">addr_bits   =</tspan> 32</text>

      <text x="560" y="60"><tspan fill="#818cf8">→ num_sets   =</tspan> 128</text>
      <text x="560" y="98"><tspan fill="#818cf8">→ index_bits =</tspan> 7</text>
      <text x="560" y="136"><tspan fill="#818cf8">→ offset_bits=</tspan> 6</text>
      <text x="560" y="174"><tspan fill="#818cf8">→ tag_bits   =</tspan> 19</text>
    </g>
    <text x="40" y="248" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="22" fill="#a5b4fc">Auto-fills as you type. Edit either side of any equation.</text>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="20" fill="#c7d2fe">cachecruncher.com</text>
</svg>
